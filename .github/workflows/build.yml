name: Continuous Integration

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version/release tag to build, for example v1.0.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    name: Build on Linux (clang-18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build plugin inside container
        env:
          SEMVER: ${{ github.event.inputs.version || github.ref_name }}
        run: docker compose -f docker/docker-compose.yml up --build --abort-on-container-exit

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1sT-Ranks_linux
          path: build/package/cs2

  build-windows:
    name: Build on Windows (MSVC)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare SDK directory
        shell: powershell
        env:
          SEMVER: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          $SDK = "C:\sdk"
          $HL2SDK = "$SDK\hl2sdk-cs2"
          $MMS = "$SDK\metamod-source"
          $SCHEMA = "${{ github.workspace }}\..\SchemaEntity"

          if (Test-Path $SDK) { Remove-Item $SDK -Recurse -Force }
          if (Test-Path $SCHEMA) { Remove-Item $SCHEMA -Recurse -Force }
          New-Item -ItemType Directory -Path $SDK | Out-Null

          git clone --recursive --branch cs2 --single-branch https://github.com/alliedmodders/hl2sdk $HL2SDK
          git clone --recursive --branch master --single-branch https://github.com/alliedmodders/metamod-source $MMS
          git clone https://github.com/pisex/SchemaEntity.git $SCHEMA

          $SDK_UNIX = $SDK.Replace("\", "/")
          $HL2SDK_UNIX = $HL2SDK.Replace("\", "/")
          $MMS_UNIX = $MMS.Replace("\", "/")

          echo "HL2SDK_ROOT=$SDK_UNIX" >> $env:GITHUB_ENV
          echo "HL2SDKCS2=$HL2SDK_UNIX" >> $env:GITHUB_ENV
          echo "MMSOURCE_DEV=$MMS_UNIX" >> $env:GITHUB_ENV
          echo "SEMVER=$env:SEMVER" >> $env:GITHUB_ENV
          echo "GITHUB_SHA_SHORT=$($env:GITHUB_SHA.Substring(0, 7))" >> $env:GITHUB_ENV

      - name: Checkout AMBuild
        uses: actions/checkout@v4
        with:
          repository: SlynxCZ/ambuild
          path: ambuild

      - name: Install AMBuild
        shell: powershell
        run: |
          pip install setuptools wheel
          cd ambuild
          python setup.py install

      - name: Configure + Build (AMBuild)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"

          mkdir build
          cd build

          python ../configure.py ^
            --enable-optimize ^
            --sdks cs2 ^
            --mms_path=%MMSOURCE_DEV% ^
            --hl2sdk-root=%HL2SDK_ROOT% ^
            --hl2sdk-manifests=%MMSOURCE_DEV%/hl2sdk-manifests

          ambuild

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1sT-Ranks_windows
          path: build/package/cs2

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: 1sT-Ranks_linux
          path: ./artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: 1sT-Ranks_windows
          path: ./artifacts/windows

      - name: Create archives
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version="${GITHUB_REF#refs/tags/}"
          fi

          tar -czf 1sT-Ranks_${version}-linux.tar.gz \
            -C artifacts/linux .

          tar -czf 1sT-Ranks_${version}-windows.tar.gz \
            -C artifacts/windows .

      - name: Upload release archives
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: 1sT-Ranks_*.tar.gz
          tag: ${{ github.event.inputs.version || github.ref }}
          file_glob: true
          release_name: "${{ github.event.inputs.version || github.ref_name }}"
